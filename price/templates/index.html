<!DOCTYPE html>
<html>
<head>
    <title>Sushi Counter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>へい！いらっしゃい！！</h1>

<p>ユーザーID:
<input id="userID" value="1">
</p>

<h2>食べたお皿のボタンを押してね！</h2>

<div class="plates">
<div class="plate-container">
    <img src="/static/plate120.png" class="plate" onclick="showSushi(120,this)">
    <div class="sushi-options"></div>
</div>

<div class="plate-container">
    <img src="/static/plate180.png" class="plate" onclick="showSushi(180,this)">
    <div class="sushi-options"></div>
</div>

<div class="plate-container">
    <img src="/static/plate260.png" class="plate" onclick="showSushi(260,this)">
    <div class="sushi-options"></div>
    </div>
</div>

<p id="order-message"></p>

<div class="character-area">

    <button class="floating-fact-btn" onclick="showTrivia()">
        豆知識を教えるでい！🍣
    </button>

    <!-- 吹き出し -->
    <div id="trivial-message" class="bubble">
        <span id="bubble-text"></span>
        <button class="close-btn" onclick="closeBubble()">X</button>
    </div>

    <div class="sushi-container"></div>

    <img src="/static/sushi_master.png" class="sushi-master">

</div>

<h2>合計金額: <span id="total">0</span>円</h2>

<script src="/static/script.js"></script>

</body>
</html>
