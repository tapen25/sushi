<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>ご来店ありがとうございます</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Boku&display=swap" rel="stylesheet">
    
    <style>
        /* のれんと筆文字用の追加デザイン */
        .app-container {
            padding-top: 0; /* のれんを一番上にピッタリくっつけるために上の余白を消す */
            overflow: hidden; /* のれんがコンテナの角丸をはみ出さないようにする */
        }

        .noren-img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px; /* のれんの下の隙間 */
        }

        .title-sushi {
            font-family: 'Yuji Mai', serif; /* 筆文字フォントを適用 */
            font-size: 42px; /* 少し大きめにして迫力を出す */
            text-align: center;
            color: #1a1a1a; /* 墨っぽい濃い黒 */
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .app-container {
    background-image:
        linear-gradient(rgba(255,255,255,0.65), rgba(255,255,255,0.65)),
        url("/static/haikei.png");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
        
        /* フォーム周りの余白調整（のれんのために上余白を消した分の補填） */
        .form-area {
            padding: 0 20px 20px 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="{{ url_for('static', filename='noren.png') }}" alt="のれん" class="noren-img">
        
        <h1 class="title-sushi">ようこそ！</h1>
        
        <p style="text-align: center; color: #718096; font-size: 14px;">初めての方は情報を入力してください。<br>以前と同じニックネームを入力すると続きから再開できます。</p>
        
        <div class="form-area">
            <form action="/register" method="POST">
                <label>ニックネーム：</label>
                <input type="text" name="username" placeholder="例: スシロー太郎" required style="margin-bottom: 15px; width: 100%; box-sizing: border-box; padding: 10px;">
                <p style="font-size: 12px; color: #e74c3c; margin-top: -10px; margin-bottom: 20px;">※お店側には公開されません</p>
                
                <label>性別：</label>
                <select name="gender" required style="width: 100%; padding: 10px; margin-bottom: 15px;">
                    <option value="" disabled selected>選択してください</option>
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                    <option value="other">その他・答えない</option>
                </select>
                
                <label>年齢：</label>
                <input type="number" name="age" min="0" max="120" placeholder="例: 20" required style="width: 100%; padding: 10px; margin-bottom: 20px; box-sizing: border-box;">
                
                <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">注文を始める</button>
            </form>
        </div>
    </div>
</body>
</html>
